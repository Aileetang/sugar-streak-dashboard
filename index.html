<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍬 Sugar Streak Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍬 Sugar Streak</h1>
            <p>Track your sugar-free journey</p>
        </header>

        <main>
            <!-- Stats Section -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Current Streak</div>
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-unit">days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Best Streak</div>
                    <div class="stat-value" id="bestStreak">0</div>
                    <div class="stat-unit">days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Tracked</div>
                    <div class="stat-value" id="totalDays">0</div>
                    <div class="stat-unit">days</div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button id="addDayBtn" class="btn btn-success">
                    ✅ Add Sugar-Free Day
                </button>
                <button id="oopsBtn" class="btn btn-danger">
                    😅 Oops! (Drank Sugar)
                </button>
            </div>

            <!-- Calendar Section -->
            <section class="calendar-section">
                <div class="calendar-header">
                    <button id="prevMonth" class="nav-btn">◀</button>
                    <h2 id="monthYear"></h2>
                    <button id="nextMonth" class="nav-btn">▶</button>
                </div>
                
                <div class="calendar-weekdays">
                    <div class="weekday">Sun</div>
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                </div>

                <div class="calendar-days" id="calendarDays"></div>

                <!-- Month Stats -->
                <div class="month-stats">
                    <div class="month-stat">
                        <span class="stat-icon">✓</span>
                        <div>
                            <div class="stat-name">Sugar-Free Days</div>
                            <div class="stat-num" id="monthSuccess">0</div>
                        </div>
                    </div>
                    <div class="month-stat">
                        <span class="stat-icon fail">✗</span>
                        <div>
                            <div class="stat-name">Days with Sugar</div>
                            <div class="stat-num" id="monthFailed">0</div>
                        </div>
                    </div>
                </div>

                <div class="calendar-hint">
                    <p>💡 Click any date to add/remove from that day</p>
                </div>
            </section>

            <!-- Date Picker Modal -->
            <div id="dateModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modalDate"></h3>
                        <button id="closeModal" class="close-btn">✕</button>
                    </div>
                    <div class="modal-body">
                        <p>What did you do on this day?</p>
                    </div>
                    <div class="modal-buttons">
                        <button id="modalSuccess" class="btn btn-success">✅ No Sugar</button>
                        <button id="modalFailed" class="btn btn-danger">😅 Drank Sugar</button>
                        <button id="modalClear" class="btn btn-clear">🗑️ Clear</button>
                    </div>
                </div>
            </div>

            <!-- Reset Button -->
            <div class="reset-section">
                <button id="resetBtn" class="btn btn-reset">
                    🔄 Reset All Data
                </button>
            </div>
        </main>

        <footer>
            <p>💪 Stay strong! You've got this!</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
